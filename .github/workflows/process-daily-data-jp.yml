name: Process Daily Data JP - Hourly Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  process-daily-data-jp:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Pipenv
        run: |
          echo "📦 Installation de Pipenv..."
          pip install --upgrade pip
          pip install pipenv

      - name: Install dependencies
        run: |
          echo "📦 Installation des dépendances depuis Pipfile..."
          pipenv install --deploy

      - name: Process Daily Data (JP)
        env:
          # Shopify API - credentials du store Japon
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN_JP }}
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN_JP }}
          SHOPIFY_API_VERSION: ${{ secrets.SHOPIFY_API_VERSION }}
          # Multi-country
          COMMERCIAL_ORGANISATION: 'JP'
          # Supabase (meme base de donnees que US)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TOKEN }}
          # Database
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          # Security
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "🚀 Démarrage du traitement des données (JP)..."
          pipenv run python run_daily_sync.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️ Le cron job JP a échoué. Vérifiez les logs ci-dessus."
